rules:

  # =====================================================================
  # 0. IM30 Mind Office 聊天 / Socket / 服务器直连（最优先）
  # =====================================================================
  # 聊天/Socket 服务器常见 IP 段（华为云/国内云）
  - IP-CIDR,1.92.0.0/16,DIRECT,no-resolve
  - IP-CIDR,119.3.0.0/16,DIRECT,no-resolve
  - IP-CIDR,139.9.0.0/16,DIRECT,no-resolve
  - IP-CIDR,124.71.0.0/16,DIRECT,no-resolve
  - IP-CIDR,120.221.0.0/16,DIRECT,no-resolve
  - IP-CIDR,120.46.0.0/16,DIRECT,no-resolve
  - IP-CIDR,114.116.0.0/16,DIRECT,no-resolve

  # 已抓到的明确服务器 IP
  - IP-CIDR,1.92.98.22/32,DIRECT,no-resolve
  - IP-CIDR,1.92.70.140/32,DIRECT,no-resolve
  - IP-CIDR,119.3.251.25/32,DIRECT,no-resolve
  - IP-CIDR,139.9.178.8/32,DIRECT,no-resolve
  - IP-CIDR,124.71.106.171/32,DIRECT,no-resolve

  # 聊天 / 推送常用端口
  - DST-PORT,7000-7100,DIRECT
  - DST-PORT,19000,DIRECT


  # =====================================================================
  # 1. ChatGPT / OpenAI
  # =====================================================================
  - DOMAIN-SUFFIX,openai.com,ChatGPT
  - DOMAIN-SUFFIX,chatgpt.com,ChatGPT
  - DOMAIN-SUFFIX,api.openai.com,ChatGPT
  - DOMAIN,cdn.auth0.com,ChatGPT


  # =====================================================================
  # 2. IM30 Mind Office 全部直连
  # =====================================================================
  - PROCESS-NAME,com.im30.mind.ios,DIRECT

  # IM30 自己服务器
  - DOMAIN-KEYWORD,im30,DIRECT
  - DOMAIN-KEYWORD,mindoffice,DIRECT
  - DOMAIN-SUFFIX,im30.net,DIRECT
  - DOMAIN-SUFFIX,mindoffice.cn,DIRECT

  # 腾讯云 CDN / 资源
  - DOMAIN-SUFFIX,myqcloud.com,DIRECT
  - DOMAIN-SUFFIX,qcloud.com,DIRECT
  - DOMAIN-SUFFIX,qcloudcdn.com,DIRECT

  # 推送 / 崩溃 / SDK
  - DOMAIN-SUFFIX,jpush.cn,DIRECT
  - DOMAIN-SUFFIX,bugly.qq.com,DIRECT
  - DOMAIN-SUFFIX,easytomessage.com,DIRECT
  - DOMAIN-SUFFIX,jpush.io,DIRECT

  # 地图 / 国内服务
  - DOMAIN-SUFFIX,baidu.com,DIRECT
  - DOMAIN-SUFFIX,qq.com,DIRECT

  # Google analytics
  - DOMAIN-SUFFIX,app-analytics-services.com,DIRECT


  # =====================================================================
  # 3. iCloud & Gateway 分流
  # =====================================================================
  - DOMAIN-SUFFIX,icloud.com,DIRECT
  - DOMAIN-SUFFIX,icloudusercontent.com,DIRECT
  - DOMAIN-SUFFIX,icloud-content.com,DIRECT
  - DOMAIN-SUFFIX,icloud-drive.com,DIRECT
  - DOMAIN-SUFFIX,storage.icloud.com,DIRECT
  - DOMAIN-KEYWORD,icloudusercontent,DIRECT
  - DOMAIN-KEYWORD,icloud-content,DIRECT

  # AI 进程必须代理
  - AND,((DOMAIN,gateway.icloud.com),(PROCESS-NAME,assistantd)),ChatGPT
  - AND,((DOMAIN,gateway.icloud.com),(PROCESS-NAME,siriinferenced)),ChatGPT
  - AND,((DOMAIN,gateway.icloud.com),(PROCESS-NAME,knowledgeconstructiond)),ChatGPT

  - DOMAIN,gateway.icloud.com,ChatGPT


